<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <title>рандом кінн</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
</head>

<body style="background-color: #1a0d00; color: white; font-family: 'DM Serif Display';">
    <h1 style="text-align: center;">⚝Цейво забув... тут буде мій рандом кінн⚝</h1>
    
    <button style="display: block; margin: 0 auto;" py-click="run">
        ⚝тикни мене⚝:
    </button>
    
    <p style="text-align: center;" id="out">просто тикни — воно випаде</p>

    <script type="py">
import random
from js import document

kinns = [
    "Римус Люпін",
    "Леонард Хофстедер",
    "Діппер Пайнс",
    "Армін Арлерт",
    "Твайлайт Спаркл",
    "Горбач",
    "Ода Сакуноске",
    "Сем Вінчестер(?)",
    "Оповідач (сама вахує)",
    "Матео"
]

def run(event=None):
    el = document.getElementById("out")
    el.innerHTML = "Мій рандом кінн:<br><b>" + random.choice(kinns) + "</b>"
    </script>
</body>
</html>
